  #             "tag": "${{ needs.setup.outputs.environment }}-${{ needs.setup.outputs.commit_sha }}"
  #           }
  #         }]

  status-comment:
    name: Deployment Status Comment
    needs: [setup, docker-build]
    runs-on: ubuntu-latest
    if: always() && needs.setup.outputs.should_deploy == 'true'
    permissions:
      contents: write
    steps:
      - name: Notify deployment status
        uses: actions/github-script@v7
        with:
          script: |
            const deployStatus = '${{ needs.deploy-to-app-platform.result }}';
            const status = deployStatus === 'success' ? '✅ Deployed' : '❌ Failed';
            const output = `### 🚀 Production Deployment
            
            **Status:** ${status}
            **Environment:** Production
            **Image:** \`${{ needs.setup.outputs.version_tag }}\`
            **App:** ${{ secrets.DO_APP_NAME }}
            
            ${status === '✅ Deployed' ? 
              '🎉 Your application has been successfully deployed to production!' : 
              '💥 Deployment failed. Check the workflow logs for details.'}`;
            
            github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: output
            }); 